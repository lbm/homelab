traefik:  
  # deployment:
  #   replicas: 3

  ingressRoute:
    dashboard:
      annotations:
        kubernetes.io/ingress.class: traefik
      matchRule: Host(`traefik.lachlan.io`)
      entryPoints:
        - websecure

  globalArguments:
    - --global.checknewversion=false
    - --global.sendanonymoususage=false

  ports:
    web:
      redirectTo: websecure

  tlsStore:
    default:
      defaultCertificate:
        secretName: wildcard-lachlan-io-tls-staging  # TODO: Swap this to the production certificate.

  service:
    spec:
      loadBalancerIP: 192.168.86.224
